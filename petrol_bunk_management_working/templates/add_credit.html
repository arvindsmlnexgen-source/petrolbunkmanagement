{% extends "base.html" %}
{% block content %}

<h2>Add Credit</h2>

<form method="POST">
    <label>Customer Name:</label>
    <input name="name" required><br><br>

    <label>Amount:</label>
    <input name="amount" type="number" step="0.01" required><br><br>

    <button type="submit">Add Credit</button>
</form>

{% endblock %}
