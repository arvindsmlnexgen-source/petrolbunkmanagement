{% extends "base.html" %}
{% block content %}

<h2>Add Sale</h2>

<form method="POST">
    <label>Shift:</label>
    <input name="shift" required><br><br>

    <label>Fuel Type:</label>
    <input name="fuel_type" required><br><br>

    <label>Quantity (Litres):</label>
    <input name="quantity" type="number" step="0.01" required><br><br>

    <label>Payment Mode:</label>
    <select name="payment_mode">
        <option>Cash</option>
        <option>Card</option>
        <option>UPI</option>
    </select><br><br>

    <button type="submit">Save Sale</button>
</form>

{% endblock %}
