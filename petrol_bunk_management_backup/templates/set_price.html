{% extends "base.html" %}
{% block content %}

<h2>Set Fuel Price</h2>

<form method="POST">
    <label>Fuel Type:</label>
    <input name="fuel_type" required><br><br>

    <label>Price Per Litre:</label>
    <input name="price" type="number" step="0.01" required><br><br>

    <button type="submit">Save Price</button>
</form>

{% endblock %}
