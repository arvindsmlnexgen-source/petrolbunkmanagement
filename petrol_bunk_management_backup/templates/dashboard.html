{% extends "base.html" %}
{% block content %}

<h2>Dashboard - {{ today }}</h2>

<div class="kpi">
    <h3>Total Revenue Today (All Payments)</h3>
    <strong>₹ {{ revenue }}</strong>
</div>

<div class="kpi">
    <h3>Pending Credit</h3>
    <strong>₹ {{ pending }}</strong>
</div>

<h3>Shift Revenue</h3>

<table>
    <tr>
        <th>Shift</th>
        <th>Total Revenue</th>
    </tr>
    {% for s in shift_data %}
    <tr>
        <td>{{ s['shift'] }}</td>
        <td>₹ {{ s['total'] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
