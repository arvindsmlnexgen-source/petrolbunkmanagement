<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sale - Petrol Pump Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .back-button {
            display: inline-block;
            background: white;
            color: var(--primary);
            padding: 12px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .back-button:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-3px);
        }

        .page-header {
            color: white;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .form-section h3 {
            color: var(--dark);
            margin-bottom: 20px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 1.5em;
            }

            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-button">← Back to Dashboard</a>

        <div class="page-header">
            <h1>➕ Add Sale Entry</h1>
        </div>

        <div class="form-container">
            <form method="POST">
                <!-- Date and Time Section -->
                <div class="form-section">
                    <h3>📅 Date & Time</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Date *</label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Time *</label>
                            <input type="time" id="time" name="time" required>
                        </div>
                    </div>
                </div>

                <!-- Pump Sales Section -->
                <div class="form-section">
                    <h3>⛽ Pump Sales (in Liters)</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="petrol">Petrol Pump 1 *</label>
                            <input type="number" id="petrol" name="petrol" step="0.01" placeholder="Enter liters" required>
                        </div>
                        <div class="form-group">
                            <label for="speed_petrol">Speed Petrol Pump 2 *</label>
                            <input type="number" id="speed_petrol" name="speed_petrol" step="0.01" placeholder="Enter liters" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="diesel">Diesel Pump 1 *</label>
                            <input type="number" id="diesel" name="diesel" step="0.01" placeholder="Enter liters" required>
                        </div>
                        <div class="form-group">
                            <label for="speed_diesel">Speed Diesel Pump 2 *</label>
                            <input type="number" id="speed_diesel" name="speed_diesel" step="0.01" placeholder="Enter liters" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">💾 Save Sale Entry</button>
            </form>
        </div>
    </div>
</body>
</html>
