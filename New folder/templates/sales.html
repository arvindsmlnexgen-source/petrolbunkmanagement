<!DOCTYPE html>
<html>

<head>

<title>Sales Entry</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.back-button {
    display: inline-block;
    background: #667eea;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 20px;
    transition: background 0.3s ease;
}

.back-button:hover {
    background: #764ba2;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#28a745;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<div class="container">

<a href="/" class="back-button">← Back to Dashboard</a>

<h1>Petrol Pump Sales</h1>

<form method="POST">

<!-- Date and Time -->
<div class="card">
<h2>Date & Time</h2>
<div class="grid">
<div>
<h3>Date</h3>
<input type="date" name="date" required>
</div>
<div>
<h3>Time</h3>
<input type="time" name="time" required>
</div>
</div>
</div>

<!-- Pump Cards -->

<!-- <div class="card">

<h2>Pump Sales (Litres)</h2>

<div class="grid"> -->

<!-- <div>
<h3>Pump1 (Petrol)</h3>
<input type="number" step="0.01" name="petrol_pump1" placeholder="Enter litres">
</div>

<div>
<h3>Pump2 (Speed Petrol)</h3>
<input type="number" step="0.01" name="speed_petrol_pump2" placeholder="Enter litres">
</div>

<div>
<h3>Pump1 (Diesel)</h3>
<input type="number" step="0.01" name="diesel_pump1" placeholder="Enter litres">
</div>

<div>
<h3>Pump2 (Speed Diesel)</h3>
<input type="number" step="0.01" name="speed_diesel_pump2" placeholder="Enter litres">
</div>

</div>

</div> -->

<!-- Meter Readings -->

<div class="card">

<h2>Meter Readings</h2>

<div class="grid">

<div>

<h3>Petrol[Pump 1]</h3>

Opening
<input name="petrol_open">

Closing
<input name="petrol_close">

Running
<input name="petrol_running" readonly>

</div>


<div>

<h3>Speed Petrol[Pump 2]</h3>

Opening
<input name="speed_petrol_open">

Closing
<input name="speed_petrol_close">

Running
<input name="speed_petrol_running" readonly>

</div>


<div>

<h3>Diesel[Pump 1]</h3>

Opening
<input name="diesel_open">

Closing
<input name="diesel_close">

Running
<input name="diesel_running" readonly>

</div>


<div>

<h3>Speed Diesel[Pump 2]</h3>

Opening
<input name="speed_diesel_open">

Closing
<input name="speed_diesel_close">

Running
<input name="speed_diesel_running" readonly>

</div>

</div>

</div>

<!-- Oil -->

<div class="card">

<h2>Oil Sales</h2>

Oil 20ML
<input name="oil20">

Oil 40ML
<input name="oil40">

</div>

<div style="text-align:center">

<button type="submit">Save Sales</button>

<!-- <button onclick="history.back()">⬅ Back</button> -->

</div>

</form>

</div>

<script>

function calc(openName, closeName, runName){

let open = parseFloat(document.getElementsByName(openName)[0].value) || 0
let close = parseFloat(document.getElementsByName(closeName)[0].value) || 0

document.getElementsByName(runName)[0].value = close - open

}

document.querySelectorAll("input").forEach(input=>{

input.addEventListener("input",function(){

calc("petrol_open","petrol_close","petrol_running")
calc("speed_petrol_open","speed_petrol_close","speed_petrol_running")
calc("diesel_open","diesel_close","diesel_running")
calc("speed_diesel_open","speed_diesel_close","speed_diesel_running")

})

})



</script>

</body>

</html>
