<!DOCTYPE html>
<html>
<head>

<title>Transactions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Add Transaction</h2>

<form method="POST">

<div class="row">

<div class="col-md-2">
<select name="type" class="form-control">

<option value="credit">Credit</option>
<option value="debit">Debit</option>

</select>
</div>

<div class="col-md-3">
<input type="text" name="category" placeholder="Category" class="form-control">
</div>

<div class="col-md-2">
<input type="number" name="amount" placeholder="Amount" class="form-control">
</div>

<div class="col-md-3">
<input type="text" name="notes" placeholder="Notes" class="form-control">
</div>

<div class="col-md-2">
<button class="btn btn-success w-100">Save</button>
</div>

</div>

</form>

<hr>

<h3 class="mt-4">All Transactions</h3>

<table class="table table-bordered mt-3">

<tr>

<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Notes</th>
<th>Date</th>

</tr>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
