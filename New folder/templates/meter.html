<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meter Entry</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  form {
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  .section {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 20px;
    background: #fafafa;
  }

  .section h3 {
    margin-top: 0;
    margin-bottom: 15px;
    color: #333;
  }

  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
  }

  .form-group {
    flex: 1 1 150px;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    margin-bottom: 5px;
    font-weight: bold;
  }

  .form-group input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background: #007BFF;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }
</style>
</head>
<body>

<h2>Meter Entry</h2>

<form method="POST">

  <div class="form-group">
    <label for="date">Date</label>
    <input type="date" id="date" name="date" required>
  </div>

  <div class="section">
    <h3>Petrol</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" step="0.01" name="petrol_open">
      </div>
      <div class="form-group">
        <label>Closing</label>
        <input type="number" step="0.01" name="petrol_close">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Speed Petrol</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" step="0.01" name="speed_petrol_open">
      </div>
      <div class="form-group">
        <label>Closing</label>
        <input type="number" step="0.01" name="speed_petrol_close">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Diesel</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" step="0.01" name="diesel_open">
      </div>
      <div class="form-group">
        <label>Closing</label>
        <input type="number" step="0.01" name="diesel_close">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Speed Diesel</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" step="0.01" name="speed_diesel_open">
      </div>
      <div class="form-group">
        <label>Closing</label>
        <input type="number" step="0.01" name="speed_diesel_close">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Oil 20ML</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" name="oil20_open">
      </div>
      <div class="form-group">
        <label>Sold</label>
        <input type="number" name="oil20_sold">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Oil 40ML</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Opening</label>
        <input type="number" name="oil40_open">
      </div>
      <div class="form-group">
        <label>Sold</label>
        <input type="number" name="oil40_sold">
      </div>
    </div>
  </div>

  <button type="submit">Save Meter</button>

</form>

</body>
</html>
